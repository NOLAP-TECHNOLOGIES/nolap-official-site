<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | NOLAP Technologies</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon-180x180.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:'Syne',sans-serif;
  background:#03060E;color:#fff;
  overflow:hidden;
  display:flex;flex-direction:column;
}

body::after{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
  background-size:68px 68px;
  pointer-events:none;z-index:0;
}

nav{
  position:relative;z-index:1;
  height:96px;padding:0 5vw;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(0,87,184,0.2);
  flex-shrink:0;
}
.nlogo img{height:80px;width:auto;object-fit:contain;display:block;}
.nbtn{
  font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;
  padding:12px 28px;background:#0057B8;color:#fff;
  text-decoration:none;transition:background .25s;
}
.nbtn:hover{background:#0046A0;}

.main{
  position:relative;z-index:1;
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 5vw;text-align:center;
  overflow:hidden;
}

.bg-text{
  position:absolute;
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(160px,30vw,320px);
  letter-spacing:8px;color:rgba(0,87,184,0.06);
  pointer-events:none;user-select:none;
  white-space:nowrap;
  top:50%;transform:translateY(-50%);
}

.label{
  display:inline-flex;align-items:center;gap:12px;margin-bottom:20px;
  animation:rise .7s ease forwards;
}
.label-dash{width:28px;height:1px;background:#0057B8;}
.label span{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  letter-spacing:4px;text-transform:uppercase;color:#0057B8;
}

h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(72px,14vw,160px);
  line-height:.85;letter-spacing:2px;color:#fff;
  margin-bottom:8px;
  animation:rise .8s cubic-bezier(.22,1,.36,1) .1s both;
}

.sub{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(22px,4vw,42px);
  letter-spacing:2px;color:#0057B8;
  margin-bottom:24px;
  animation:rise .8s ease .2s both;
}

p{
  font-size:15px;line-height:1.8;
  color:rgba(255,255,255,0.55);
  max-width:420px;margin-bottom:40px;
  animation:rise .8s ease .3s both;
}

.btns{
  display:flex;gap:14px;justify-content:center;flex-wrap:wrap;
  animation:rise .8s ease .4s both;
}

.bfill{
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;
  padding:15px 36px;background:#0057B8;color:#fff;
  text-decoration:none;border:1px solid #0057B8;transition:background .25s;
}
.bfill:hover{background:#0046A0;}

.bline{
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;
  padding:15px 36px;background:transparent;color:#fff;
  text-decoration:none;border:1px solid rgba(255,255,255,0.22);
  transition:border-color .25s,background .25s;
}
.bline:hover{border-color:#0057B8;background:rgba(0,87,184,0.12);}

@keyframes rise{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

@media(max-width:480px){
  .btns{flex-direction:column;align-items:center;}
  .nbtn{display:none;}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nlogo"><img src="logo.png" alt="NOLAP Technologies"></a>
  <a href="index.html" class="nbtn">Back to Home</a>
</nav>

<div class="main">
  <div class="bg-text">404</div>

  <div class="label">
    <div class="label-dash"></div>
    <span>Error — Page Not Found</span>
  </div>

  <h1>404</h1>
  <div class="sub">This page doesn't exist.</div>
  <p>The page you're looking for was moved, deleted, or never existed. Let's get you back on track.</p>

  <div class="btns">
    <a href="index.html" class="bfill">Back to Home</a>
    <a href="portfolio.html" class="bline">View Our Work</a>
  </div>
</div>

</body>
</html>
